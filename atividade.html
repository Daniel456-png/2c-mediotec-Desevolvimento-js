<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercícios de Função</title>
</head>
<body>

  <h1>Atividade</h1>

  <script>

    function soma(numero1, numero2) {
      let resultado = numero1 + numero2;
      console.log("Resultado da soma: " + resultado);
    }

    soma(10, 5);

    let nome = prompt("Digite seu nome:");
    let idade = Number(prompt("Digite sua idade:"));

    let nota1 = Number(prompt("Digite a primeira nota:"));
    let nota2 = Number(prompt("Digite a segunda nota:"));

    let media = (nota1 + nota2) / 2;

    let maiorIdade;

    if (idade >= 18) {
      maiorIdade = "Maior de idade";
    } else {
      maiorIdade = "Menor de idade";
    }
    let resultadoFinal;

    if (media >= 7) {
      resultadoFinal = "Aprovado";
    } else {
      resultadoFinal = "Reprovado";
    }

 
    console.log("Nome: " + nome);
    console.log("Idade: " + idade);
    console.log("Média: " + media.toFixed(2));
    console.log(maiorIdade);
    console.log(resultadoFinal);


    document.write("<h2>Resultado Final</h2>");
    document.write("Nome: " + nome + "<br>");
    document.write("Idade: " + idade + "<br>");
    document.write("Média: " + media.toFixed(2) + "<br>");
    document.write(maiorIdade + "<br>");
    document.write(resultadoFinal);

  </script>

</body>
</html>
